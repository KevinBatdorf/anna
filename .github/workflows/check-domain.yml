name: Check Anna's Archive Domain

on:
  schedule:
    - cron: '0 12 * * *' # daily at noon UTC
  workflow_dispatch: # manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  check-domain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check Wikipedia for current domain
        id: check
        run: |
          # Fetch the Wikipedia page wikitext via MediaWiki API
          WIKITEXT=$(curl -sL \
            'https://en.wikipedia.org/w/api.php?action=parse&page=Anna%27s_Archive&prop=wikitext&format=json' \
            | jq -r '.parse.wikitext["*"]')

          if [ -z "$WIKITEXT" ] || [ "$WIKITEXT" = "null" ]; then
            echo "::error::Failed to fetch Wikipedia page"
            exit 1
          fi

          # Extract the first annas-archive.XX domain mentioned in the wikitext
          WIKI_DOMAIN=$(echo "$WIKITEXT" | grep -oP 'annas-archive\.\w+' | head -1)

          if [ -z "$WIKI_DOMAIN" ]; then
            echo "::error::Could not find annas-archive domain on Wikipedia"
            exit 1
          fi

          WIKI_TLD=$(echo "$WIKI_DOMAIN" | grep -oP '\.\K\w+$')
          echo "Wikipedia says: $WIKI_DOMAIN"

          # Current TLD from docker-compose.yml (source of truth)
          CURRENT_TLD=$(grep -oP 'annas-archive\.\K\w+' docker-compose.yml | head -1)
          echo "Codebase has: annas-archive.$CURRENT_TLD"

          if [ "$WIKI_TLD" = "$CURRENT_TLD" ]; then
            echo "Domain is up to date"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::Domain changed .${CURRENT_TLD} -> .${WIKI_TLD}"
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "old_tld=$CURRENT_TLD" >> "$GITHUB_OUTPUT"
            echo "new_tld=$WIKI_TLD" >> "$GITHUB_OUTPUT"
          fi

      - name: Check for existing PR
        if: steps.check.outputs.changed == 'true'
        id: existing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEW_TLD: ${{ steps.check.outputs.new_tld }}
        run: |
          BRANCH="update-domain-to-${NEW_TLD}"
          BRANCH_EXISTS=$(git ls-remote --heads origin "$BRANCH" | wc -l)
          PR_COUNT=$(gh pr list --search "Update Anna's Archive domain" --state open --json number --jq length 2>/dev/null || echo "0")
          if [ "$BRANCH_EXISTS" -gt 0 ] || [ "$PR_COUNT" -gt 0 ]; then
            echo "Branch or PR already exists, skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Update domain and open PR
        if: steps.check.outputs.changed == 'true' && steps.existing.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OLD_TLD: ${{ steps.check.outputs.old_tld }}
          NEW_TLD: ${{ steps.check.outputs.new_tld }}
        run: |
          OLD="annas-archive.${OLD_TLD}"
          NEW="annas-archive.${NEW_TLD}"

          # Replace in all tracked source files (not .env — it's gitignored)
          git ls-files '*.ts' '*.md' '*.yml' '*.yaml' '.env.example' \
            | xargs grep -l "$OLD" 2>/dev/null \
            | while read -r f; do
              sed -i "s|${OLD}|${NEW}|g" "$f"
              echo "  Updated $f"
            done

          # Commit and push
          BRANCH="update-domain-to-${NEW_TLD}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add -A
          git diff --cached --quiet && { echo "No changes to commit"; exit 0; }
          git commit -m "Update Anna's Archive domain: .${OLD_TLD} -> .${NEW_TLD}"
          git push -u origin "$BRANCH"

          # Open PR
          gh pr create \
            --title "Update Anna's Archive domain to .${NEW_TLD}" \
            --body "Wikipedia now lists \`annas-archive.${NEW_TLD}\` as the primary domain (was \`.${OLD_TLD}\`).

          Updates all hardcoded references. Remember to also update your local \`.env\`:
          \`\`\`
          ANNAS_BASE_URL=https://annas-archive.${NEW_TLD}
          \`\`\`

          _Auto-generated by [check-domain](.github/workflows/check-domain.yml)._"
