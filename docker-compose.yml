services:
  aria2:
    image: p3terx/aria2-pro
    container_name: anna-aria2
    environment:
      PUID: 1000
      PGID: 1000
      RPC_SECRET: anna
      RPC_PORT: 6800
      LISTEN_PORT: 6888
    volumes:
      - ./data/torrents:/downloads
      - ./data/aria2-config:/config
    ports:
      - "6800:6800"
      - "6888:6888"
      - "6888:6888/udp"
    restart: unless-stopped

  api:
    build: .
    container_name: anna-api
    volumes:
      - ./data:/data
    environment:
      DB_PATH: "/data/db/anna.db"
      PORT: "${PORT:-3100}"
      ANNAS_BASE_URL: "${ANNAS_BASE_URL:-https://annas-archive.li}"
      ANNAS_API_KEY: "${ANNAS_API_KEY:-}"
      OLLAMA_URL: "${OLLAMA_URL:-}"
      OLLAMA_EMBED_MODEL: "${OLLAMA_EMBED_MODEL:-nomic-embed-text}"
      UPDATE_INTERVAL_DAYS: "${UPDATE_INTERVAL_DAYS:-30}"
      ARIA2_URL: "http://anna-aria2:6800/jsonrpc"
      ARIA2_SECRET: "anna"
      DATA_DIR: "/data/torrents"
      LIMIT: "${IMPORT_LIMIT:-0}"
    command: bun run /app/src/index.ts
    ports:
      - "${PORT:-3100}:${PORT:-3100}"
    restart: unless-stopped
    depends_on:
      - aria2

